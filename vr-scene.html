<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>VR Scene</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }

    a-scene {
      position: fixed; inset: 0;
      width: 100% !important;
      height: 100% !important;
    }

    /* ── Pre-VR overlay ─────────────────────────────────────────── */
    #overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 28px; gap: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e0e0e0;
    }
    .step-label {
      font-size: 11px; letter-spacing: 0.12em;
      text-transform: uppercase; color: #555;
    }
    #overlay h1 { font-size: 24px; font-weight: 600; }

    .cal-row {
      display: flex; justify-content: space-between; align-items: center;
      width: 100%; max-width: 340px;
      padding: 10px 14px; background: #1a1a1a; border-radius: 8px; font-size: 13px;
    }
    .cal-row .lbl { color: #666; }
    .ok   { color: #4caf50; font-weight: 500; }
    .warn { color: #ff9800; font-weight: 500; }

    .hint {
      font-size: 12px; color: #555; text-align: center;
      line-height: 1.7; max-width: 300px;
    }

    #enter-btn {
      margin-top: 8px; width: 100%; max-width: 340px; height: 56px;
      border-radius: 14px; border: none;
      background: #4a9eff; color: #fff;
      font-size: 18px; font-weight: 700; cursor: pointer;
    }
    #enter-btn:active { opacity: 0.85; }

    #recal-btn {
      width: 100%; max-width: 340px; height: 40px;
      border-radius: 10px; border: 1px solid #2a2a2a;
      background: transparent; color: #555; font-size: 13px; cursor: pointer;
    }

    /* ── Exit button (shown in stereo mode) ─────────────────────── */
    #exit-btn {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%); z-index: 200;
      padding: 10px 24px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.65); color: #fff;
      font-size: 13px; font-family: -apple-system, sans-serif;
      cursor: pointer; display: none;
    }

    /* divider line in stereo mode */
    #divider {
      position: fixed; top: 0; bottom: 0; left: 50%;
      width: 2px; background: #111;
      display: none; z-index: 50;
      transform: translateX(-50%);
    }
  </style>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- aframe-stereo-component: layer-based eye assignment -->
  <script src="https://cdn.jsdelivr.net/npm/aframe-stereo-component/dist/aframe-stereo-component.min.js"></script>

  <script>
    // ── Manual stereo + barrel distortion render system ──────────────────
    //
    // Pipeline:
    //   1. Render scene (left eye | right eye) → off-screen WebGLRenderTarget
    //   2. Full-screen distortion pass → screen
    //
    // The barrel distortion shader pre-distorts each eye half with pincushion
    // distortion so that after passing through the Cardboard lens (which applies
    // barrel distortion), the image appears undistorted.
    //
    // k1 / k2 are the viewer's barrel distortion coefficients.
    // Defaults match the generic Google Cardboard v1 profile.
    // They can be overridden in activate() once decoded from the QR protobuf.

    AFRAME.registerSystem('manual-stereo', {
      schema: {
        ipd: { type: 'number', default: 0.064 },  // metres
        k1:  { type: 'number', default: 0.441 },  // barrel coeff 1 (Cardboard default)
        k2:  { type: 'number', default: 0.156 },  // barrel coeff 2 (Cardboard default)
      },

      init() {
        this._active      = false;
        this._origRender  = null;
        this.stereoCamera = new THREE.StereoCamera();
        this.renderTarget = null;
        this.distortScene = null;
        this.distortCam   = null;
        this.distortMat   = null;

        this.el.addEventListener('loaded', () => {
          this._buildDistortionPass();
          this._patchRenderer();
        });

        window.addEventListener('resize', () => this._onResize());
      },

      // ── Build the off-screen render target and distortion quad ──────────
      _buildDistortionPass() {
        const renderer = this.el.renderer;
        const size     = new THREE.Vector2();
        renderer.getSize(size);

        this.renderTarget = new THREE.WebGLRenderTarget(size.x, size.y, {
          minFilter: THREE.LinearFilter,
          magFilter: THREE.LinearFilter,
        });

        // Vertex shader — passes UVs straight through
        const vert = `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `;

        // Fragment shader — barrel (pincushion pre-correction) per eye half
        //
        // For each output pixel we compute where in the render target to sample.
        // The forward barrel formula  r' = r*(1 + k1*r² + k2*r⁴)  moves the
        // sample point outward, which compresses the image inward on screen
        // (pincushion distortion).  The Cardboard lens then expands it back to
        // look undistorted.
        //
        // Aspect ratio of each eye half is corrected so distortion is circular,
        // not elliptical.
        const frag = `
          precision mediump float;
          uniform sampler2D tDiffuse;
          uniform float k1;
          uniform float k2;
          varying vec2 vUv;

          vec2 barrelUV(vec2 uv, vec2 lensCenter) {
            // Normalise to [-1, 1] centred on the lens, with aspect correction
            // (each eye half is approx half the screen width × full height)
            vec2 p = uv - lensCenter;
            p.x *= 2.0;            // correct for ~0.5 aspect of each eye half

            float r2 = dot(p, p);
            float r4 = r2 * r2;
            float dist = 1.0 + k1 * r2 + k2 * r4;

            p *= dist;
            p.x /= 2.0;
            return p + lensCenter;
          }

          void main() {
            vec2 uv = vUv;
            vec2 s;

            if (uv.x < 0.5) {
              s = barrelUV(uv, vec2(0.25, 0.5));
              // black outside the left eye region
              if (s.x < 0.0 || s.x > 0.5 || s.y < 0.0 || s.y > 1.0) {
                gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0); return;
              }
            } else {
              s = barrelUV(uv, vec2(0.75, 0.5));
              // black outside the right eye region
              if (s.x < 0.5 || s.x > 1.0 || s.y < 0.0 || s.y > 1.0) {
                gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0); return;
              }
            }

            gl_FragColor = texture2D(tDiffuse, s);
          }
        `;

        this.distortMat = new THREE.ShaderMaterial({
          uniforms: {
            tDiffuse: { value: this.renderTarget.texture },
            k1:       { value: this.data.k1 },
            k2:       { value: this.data.k2 },
          },
          vertexShader:   vert,
          fragmentShader: frag,
        });

        const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), this.distortMat);
        this.distortScene = new THREE.Scene();
        this.distortScene.add(quad);
        this.distortCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
      },

      // ── Patch renderer.render once ───────────────────────────────────────
      _patchRenderer() {
        const renderer = this.el.renderer;
        const self     = this;
        const orig     = renderer.render.bind(renderer);
        this._origRender = orig;

        renderer.render = function(scene, camera) {
          if (!self._active) { orig(scene, camera); return; }
          self._drawStereo(scene, camera);
        };
      },

      // ── Two-pass stereo draw ─────────────────────────────────────────────
      _drawStereo(scene, camera) {
        const renderer     = this.el.renderer;
        const stereoCamera = this.stereoCamera;

        stereoCamera.eyeSep = this.data.ipd;
        stereoCamera.update(camera);

        const size = new THREE.Vector2();
        renderer.getSize(size);
        const w = Math.floor(size.x / 2);
        const h = size.y;

        // Pass 1: render both eyes into the off-screen render target
        renderer.setRenderTarget(this.renderTarget);
        renderer.autoClear = false;
        renderer.clear();
        renderer.setScissorTest(true);

        renderer.setViewport(0, 0, w, h);
        renderer.setScissor (0, 0, w, h);
        this._origRender(scene, stereoCamera.cameraL);

        renderer.setViewport(w, 0, w, h);
        renderer.setScissor (w, 0, w, h);
        this._origRender(scene, stereoCamera.cameraR);

        renderer.setScissorTest(false);
        renderer.setViewport(0, 0, size.x, size.y);

        // Pass 2: apply barrel distortion and blit to screen
        renderer.setRenderTarget(null);
        renderer.autoClear = true;
        this._origRender(this.distortScene, this.distortCam);
      },

      _onResize() {
        if (!this.renderTarget) return;
        const size = new THREE.Vector2();
        this.el.renderer.getSize(size);
        this.renderTarget.setSize(size.x, size.y);
      },

      activate(ipd, k1, k2) {
        if (ipd && ipd > 0) { this.data.ipd = ipd; this.stereoCamera.eyeSep = ipd; }
        if (k1 != null && this.distortMat) this.distortMat.uniforms.k1.value = k1;
        if (k2 != null && this.distortMat) this.distortMat.uniforms.k2.value = k2;
        this._active = true;
      },

      deactivate() {
        this._active = false;
        const renderer = this.el.renderer;
        const size = new THREE.Vector2();
        renderer.getSize(size);
        renderer.setRenderTarget(null);
        renderer.setViewport(0, 0, size.x, size.y);
        renderer.setScissorTest(false);
        renderer.autoClear = true;
      }
    });
  </script>

  <script>
    // ── Cardboard QR protobuf decoder ────────────────────────────────────
    //
    // The Cardboard QR URL is:  http://google.com/cardboard/cfg?p=<base64url>
    // The `p` value is a serialised CardboardDeviceParams proto with fields:
    //   1  vendor               (string)
    //   2  model                (string)
    //   3  screen_to_lens_dist  (float32, metres)
    //   4  inter_lens_distance  (float32, metres)   ← IPD
    //   5  vertical_alignment   (enum/varint)
    //   6  tray_to_lens_dist    (float32, metres)
    //   7  distortion_coeffs    (repeated float32)  ← k1, k2
    //   8  left_eye_fov_angles  (nested message)    ← outer/inner/upper/lower°
    //  10  has_magnet           (bool/varint)

    function decodeCardboardParams(base64urlStr) {
      const DEFAULTS = {
        vendor: '', model: '',
        screenToLensDist: 0.042,
        interLensDist:    0.064,   // 64 mm
        trayToLensDist:   0.035,
        distortionCoeffs: [0.441, 0.156],
        fov: { outer: 50, inner: 50, upper: 50, lower: 50 }
      };

      if (!base64urlStr) return DEFAULTS;

      // Clone defaults; distortionCoeffs starts empty so we can detect if
      // the proto actually contained any values.
      const out = { ...DEFAULTS, distortionCoeffs: [] };

      try {
        // base64url → standard base64 → binary
        const b64 = base64urlStr.replace(/-/g, '+').replace(/_/g, '/');
        const pad = b64 + '='.repeat((4 - b64.length % 4) % 4);
        const bin = atob(pad);
        const buf = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);

        _parseProto(buf, 0, buf.length, out);

        if (out.distortionCoeffs.length === 0)
          out.distortionCoeffs = DEFAULTS.distortionCoeffs;
      } catch (e) {
        console.warn('[Cardboard] QR decode failed, using defaults:', e);
        return DEFAULTS;
      }

      return out;
    }

    function _parseProto(buf, start, end, out) {
      let p = start;

      function varint() {
        let v = 0, s = 0;
        while (p < end) {
          const b = buf[p++];
          v |= (b & 0x7f) << s;
          if (!(b & 0x80)) break;
          s += 7;
        }
        return v >>> 0;
      }

      function float32() {
        const v = new DataView(buf.buffer, buf.byteOffset + p, 4).getFloat32(0, true);
        p += 4; return v;
      }

      function str(n) {
        const v = new TextDecoder().decode(buf.subarray(p, p + n));
        p += n; return v;
      }

      while (p < end) {
        const tag = varint();
        const fn  = tag >> 3;
        const wt  = tag & 0x7;

        if (fn === 1 && wt === 2) { out.vendor            = str(varint());   continue; }
        if (fn === 2 && wt === 2) { out.model             = str(varint());   continue; }
        if (fn === 3 && wt === 5) { out.screenToLensDist  = float32();       continue; }
        if (fn === 4 && wt === 5) { out.interLensDist     = float32();       continue; }
        if (fn === 5 && wt === 0) { out.verticalAlignment = varint();        continue; }
        if (fn === 6 && wt === 5) { out.trayToLensDist    = float32();       continue; }
        if (fn === 10 && wt === 0){ out.hasMagnet         = !!varint();      continue; }

        if (fn === 7) {
          if (wt === 5) {
            // unpacked: one float per tag occurrence
            out.distortionCoeffs.push(float32());
          } else if (wt === 2) {
            // packed: length-prefixed block of floats
            const len = varint(); const stop = p + len;
            while (p < stop) out.distortionCoeffs.push(float32());
          }
          continue;
        }

        if (fn === 8 && wt === 2) {
          // left_eye_fov_angles — nested message
          const len = varint();
          out.fov = _parseFov(buf, p, p + len);
          p += len;
          continue;
        }

        // skip unknown field
        if      (wt === 0) varint();
        else if (wt === 1) p += 8;
        else if (wt === 2) p += varint();
        else if (wt === 5) p += 4;
      }
    }

    function _parseFov(buf, start, end) {
      const fov = { outer: 50, inner: 50, upper: 50, lower: 50 };
      let p = start;
      while (p < end) {
        const tag = buf[p++];
        const fn  = tag >> 3;
        if ((tag & 0x7) !== 5) { p += 4; continue; } // all fields are float32
        const v = new DataView(buf.buffer, buf.byteOffset + p, 4).getFloat32(0, true);
        p += 4;
        if (fn === 1) fov.outer = v;
        if (fn === 2) fov.inner = v;
        if (fn === 3) fov.upper = v;
        if (fn === 4) fov.lower = v;
      }
      return fov;
    }
  </script>
</head>
<body>

<!-- ── A-Frame scene ──────────────────────────────────────────────────── -->
<a-scene
  id="main-scene"
  manual-stereo
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
  embedded
>
  <!-- Camera rig: look-controls drives head tracking via gyroscope -->
  <a-entity id="rig" position="0 1.6 0">
    <a-entity
      id="cam"
      camera="fov: 80"
      look-controls="
        pointerLockEnabled: false;
        magicWindowTrackingEnabled: true;
        touchEnabled: true
      "
      stereocam="eye: left"
    >
      <!-- Gaze reticle — same fuse timing as your CardboardReticlePointer.cs (1500ms) -->
      <a-entity
        cursor="fuse: true; fuseTimeout: 1500"
        position="0 0 -1"
        geometry="primitive: ring; radiusInner: 0.012; radiusOuter: 0.017"
        material="color: white; shader: flat; opacity: 0.85"
        raycaster="objects: .interactive"
        animation__fusing="property: scale; startEvents: fusing; easing: easeInCubic; dur: 1500; from: 1 1 1; to: 0.1 0.1 0.1"
        animation__mouseleave="property: scale; startEvents: mouseleave; dur: 150; to: 1 1 1"
      ></a-entity>
    </a-entity>
  </a-entity>

  <!-- ================================================================
       YOUR SCENE CONTENT — put your thesis VR content below.
       Add  stereo="eye:both"  to any entity you add so both eyes see it.
       ================================================================ -->

  <a-sky color="#87CEEB" stereo="eye: both"></a-sky>

  <!-- Ground -->
  <a-plane
    position="0 0 0" rotation="-90 0 0"
    width="40" height="40"
    color="#7cba6a"
    stereo="eye: both"
  ></a-plane>

  <!-- Placeholder objects -->
  <a-sphere
    class="interactive"
    position="0 1.5 -3" radius="0.5" color="#4a9eff"
    stereo="eye: both"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear"
    event-set__enter="_event: mouseenter; material.color: #88ccff"
    event-set__leave="_event: mouseleave; material.color: #4a9eff"
  ></a-sphere>

  <a-box
    class="interactive"
    position="-2 0.5 -3" width="1" height="1" depth="1" color="#e05a5a"
    stereo="eye: both"
    event-set__enter="_event: mouseenter; material.color: #ff9999"
    event-set__leave="_event: mouseleave; material.color: #e05a5a"
  ></a-box>

  <a-cylinder
    class="interactive"
    position="2 0.75 -3" radius="0.5" height="1.5" color="#4ecb71"
    stereo="eye: both"
    event-set__enter="_event: mouseenter; material.color: #90ffb0"
    event-set__leave="_event: mouseleave; material.color: #4ecb71"
  ></a-cylinder>

  <!-- ================================================================ -->

  <!-- Hemisphere light: sky colour from above, warm ground bounce from below -->
  <a-light type="hemisphere" color="#ddeeff" ground-color="#b5d9a0" intensity="1.2"></a-light>
  <!-- Key light: sun from upper-right -->
  <a-light type="directional" color="#fff8e7" intensity="1.4" position="3 8 2"></a-light>
  <!-- Soft fill from the left to reduce harsh shadows -->
  <a-light type="directional" color="#c8dff7" intensity="0.4" position="-4 3 -2"></a-light>

</a-scene>

<!-- divider between eyes -->
<div id="divider"></div>

<!-- ── Pre-VR overlay ────────────────────────────────────────────────── -->
<div id="overlay">
  <div class="step-label">Step 3 of 3</div>
  <h1>Ready for VR</h1>

  <div class="cal-row">
    <span class="lbl">Calibrated DPI</span>
    <span id="sum-dpi">—</span>
  </div>
  <div class="cal-row">
    <span class="lbl">Viewer profile (IPD)</span>
    <span id="sum-qr">—</span>
  </div>

  <p class="hint">
    Insert your phone into your Cardboard viewer,<br>
    then tap <strong>Enter VR</strong>.
  </p>

  <!-- Must be a direct user-gesture handler so device orientation permission fires -->
  <button id="enter-btn" onclick="enterVR()">Enter VR</button>
  <button id="recal-btn" onclick="window.location.href='ruler.html'">← Recalibrate</button>
</div>

<button id="exit-btn" onclick="exitVR()">Exit VR</button>

<script>
  // ── Decode calibration data ────────────────────────────────────────────
  const savedDPI = parseFloat(localStorage.getItem('savedDPI')) || 0;

  // Decode QR protobuf — gives us real IPD, k1/k2, and FOV for this viewer
  const qrParams = decodeCardboardParams(localStorage.getItem('cardboardParams') || '');
  const qrScanned = !!localStorage.getItem('cardboardParams');

  const dpiEl = document.getElementById('sum-dpi');
  dpiEl.textContent = savedDPI > 0 ? savedDPI.toFixed(1) + ' PPI' : 'Not calibrated';
  dpiEl.className   = savedDPI > 0 ? 'ok' : 'warn';

  const qrEl = document.getElementById('sum-qr');
  if (qrScanned) {
    const ipd = (qrParams.interLensDist * 1000).toFixed(1);
    const k1  = qrParams.distortionCoeffs[0].toFixed(3);
    const k2  = qrParams.distortionCoeffs[1].toFixed(3);
    qrEl.textContent = `${qrParams.model || 'Viewer'} · IPD ${ipd} mm · k1 ${k1} · k2 ${k2}`;
    qrEl.className   = 'ok';
  } else {
    const ipd = (qrParams.interLensDist * 1000).toFixed(1);
    qrEl.textContent = `Defaults · IPD ${ipd} mm`;
    qrEl.className   = 'warn';
  }

  // ── Enter stereo mode ──────────────────────────────────────────────────
  async function enterVR() {
    // iOS 13+: must request gyroscope permission inside a user gesture and
    // await the result before proceeding — otherwise orientation events won't
    // fire even if the user grants access.
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const result = await DeviceOrientationEvent.requestPermission();
        if (result !== 'granted') {
          console.warn('[VR] Device orientation permission denied — head tracking will not work.');
        }
      } catch (e) {
        console.warn('[VR] Device orientation permission error:', e);
      }
    }

    const scene     = document.getElementById('main-scene');
    const stereoSys = scene.systems['manual-stereo'];
    const cam       = document.getElementById('cam');

    if (!stereoSys) {
      console.error('[VR] manual-stereo system not ready yet — try again.');
      return;
    }

    // Apply FOV from viewer profile (vertical = upper + lower degrees)
    const vFov = qrParams.fov.upper + qrParams.fov.lower;
    if (vFov > 0) cam.setAttribute('camera', 'fov', vFov);

    document.getElementById('overlay').style.display  = 'none';
    document.getElementById('exit-btn').style.display = 'block';
    document.getElementById('divider').style.display  = 'block';

    // Pass decoded IPD and distortion coefficients to the stereo renderer
    stereoSys.activate(
      qrParams.interLensDist,
      qrParams.distortionCoeffs[0],
      qrParams.distortionCoeffs[1]
    );
  }

  // ── Exit stereo mode ───────────────────────────────────────────────────
  function exitVR() {
    const scene     = document.getElementById('main-scene');
    const stereoSys = scene.systems['manual-stereo'];
    stereoSys.deactivate();

    document.getElementById('exit-btn').style.display = 'none';
    document.getElementById('divider').style.display  = 'none';
    document.getElementById('overlay').style.display  = 'flex';
  }

  // ── Data collection helper ─────────────────────────────────────────────
  // Call window.collectDataPoint('event-name', { any: 'payload' }) from
  // your own scene scripts to log participant interactions.
  window.collectDataPoint = function(eventType, payload) {
    const log = JSON.parse(localStorage.getItem('thesisData') || '[]');
    log.push({ t: Date.now(), dpi: savedDPI, ipd: IPD_METRES, event: eventType, ...payload });
    localStorage.setItem('thesisData', JSON.stringify(log));
  };
</script>
</body>
</html>
