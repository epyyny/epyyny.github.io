<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Step 2 — Scan Viewer QR Code</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header { padding: 20px 20px 0; flex-shrink: 0; }
    .step-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #666; }
    h1 { font-size: 22px; font-weight: 600; margin-top: 4px; }
    .subtitle { font-size: 13px; color: #888; margin-top: 6px; line-height: 1.5; }

    .camera-wrap {
      position: relative; flex: 1; margin: 16px;
      border-radius: 14px; overflow: hidden;
      background: #111; min-height: 240px;
    }
    #video { width: 100%; height: 100%; object-fit: cover; display: block; }
    #canvas { display: none; }

    /* Scan corners */
    .scan-frame {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .scan-box { width: 200px; height: 200px; position: relative; }
    .scan-box::before, .scan-box::after, .corner-br, .corner-bl {
      content: ''; position: absolute; width: 28px; height: 28px;
      border-color: #4a9eff; border-style: solid;
    }
    .scan-box::before { top: 0; left: 0; border-width: 3px 0 0 3px; }
    .scan-box::after  { top: 0; right: 0; border-width: 3px 3px 0 0; }
    .corner-br { bottom: 0; right: 0; border-width: 0 3px 3px 0; }
    .corner-bl { bottom: 0; left: 0; border-width: 0 0 3px 3px; }
    .scan-line {
      position: absolute; left: 4px; right: 4px; height: 2px;
      background: linear-gradient(90deg, transparent, #4a9eff, transparent);
      animation: scan 1.8s ease-in-out infinite; top: 0;
    }
    @keyframes scan {
      0%   { top: 4px; opacity: 1; }
      90%  { top: calc(100% - 6px); opacity: 1; }
      100% { top: calc(100% - 6px); opacity: 0; }
    }

    /* Overlays */
    .overlay {
      position: absolute; inset: 0; border-radius: 14px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; background: rgba(0,0,0,0.88);
      text-align: center; padding: 20px;
    }
    .overlay.hidden { display: none; }
    .overlay-icon  { font-size: 44px; line-height: 1; }
    .overlay-title { font-size: 15px; font-weight: 600; }
    .overlay-sub   { font-size: 12px; color: #888; }
    .overlay-btn {
      margin-top: 4px; padding: 10px 24px;
      border-radius: 20px; border: 1px solid #4a9eff;
      background: transparent; color: #4a9eff;
      font-size: 14px; cursor: pointer;
    }

    /* Bottom */
    .bottom { padding: 0 16px 24px; display: flex; flex-direction: column; gap: 8px; }

    /* Status pill */
    #status-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-radius: 8px;
      background: #1a1a1a; font-size: 12px; color: #888;
      min-height: 42px; word-break: break-all;
    }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #555; flex-shrink: 0;
    }
    #status-dot.scanning { background: #4a9eff; animation: pulse 1.2s ease-in-out infinite; }
    #status-dot.ok       { background: #4caf50; animation: none; }
    #status-dot.error    { background: #f44336; animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* Buttons */
    .skip-btn {
      width: 100%; height: 46px; border-radius: 10px;
      border: 1px solid #333; background: transparent;
      color: #888; font-size: 14px; cursor: pointer;
    }
    .skip-btn:active { background: #1a1a1a; }

    /* Manual entry */
    #manual-wrap {
      display: none; flex-direction: column; gap: 6px;
      padding: 12px; background: #141414;
      border: 1px solid #2a2a2a; border-radius: 10px;
    }
    #manual-wrap.visible { display: flex; }
    #manual-wrap label { font-size: 11px; color: #666; }
    #manual-input {
      width: 100%; padding: 10px; border-radius: 8px;
      border: 1px solid #333; background: #0f0f0f;
      color: #e0e0e0; font-size: 12px;
    }
    #manual-btn {
      padding: 10px; border-radius: 8px; border: none;
      background: #4a9eff; color: #fff; font-size: 13px;
      font-weight: 600; cursor: pointer;
    }
    .toggle-manual {
      font-size: 12px; color: #555; text-align: center;
      cursor: pointer; text-decoration: underline;
    }
  </style>
</head>
<body>

<header>
  <div class="step-label">Step 2 of 3</div>
  <h1>Scan Viewer QR Code</h1>
  <p class="subtitle">Point the rear camera at the QR code on your Cardboard viewer.</p>
</header>

<div class="camera-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <div class="scan-frame" id="scan-frame">
    <div class="scan-box">
      <div class="corner-br"></div>
      <div class="corner-bl"></div>
      <div class="scan-line"></div>
    </div>
  </div>

  <!-- Start overlay (tap to begin) -->
  <div class="overlay" id="ov-start">
    <div class="overlay-icon">📷</div>
    <div class="overlay-title">Tap to start camera</div>
    <div class="overlay-sub">Camera access is needed to scan the QR code on your viewer.</div>
    <button class="overlay-btn" onclick="startCamera()">Allow camera</button>
  </div>

  <!-- Success -->
  <div class="overlay hidden" id="ov-success">
    <div class="overlay-icon">✓</div>
    <div class="overlay-title">Viewer detected!</div>
    <div class="overlay-sub" id="success-detail"></div>
  </div>

  <!-- Error -->
  <div class="overlay hidden" id="ov-error">
    <div class="overlay-icon">⚠</div>
    <div class="overlay-title" id="error-title">Error</div>
    <div class="overlay-sub" id="error-detail"></div>
    <button class="overlay-btn" onclick="startCamera()">Retry</button>
  </div>
</div>

<div class="bottom">
  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">Waiting…</span>
  </div>

  <!-- Manual URL entry — shown if auto-scan fails -->
  <div id="manual-wrap">
    <label>Paste your Cardboard QR URL manually:</label>
    <input id="manual-input" type="url"
      placeholder="http://google.com/cardboard/cfg?p=…">
    <button id="manual-btn" onclick="submitManual()">Use this URL</button>
  </div>

  <p class="toggle-manual" onclick="toggleManual()">Enter URL manually instead</p>
  <button class="skip-btn" onclick="skip()">Skip — use default viewer settings</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"
        onerror="document.getElementById('status-text').textContent='jsQR CDN failed — check internet and reload.'"></script>
<script>
  // Guard: if jsQR CDN failed to load, show error immediately
  if (typeof jsQR === 'undefined') {
    document.getElementById('status-dot').className = 'error';
    document.getElementById('status-text').textContent = 'QR library failed to load. Check internet and reload.';
  }

  const video  = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');
  let scanning = false;
  let stream   = null;

  // ── Status helper ──────────────────────────────────────────────────────
  function setStatus(state, msg) {
    document.getElementById('status-dot').className = state;   // '', 'scanning', 'ok', 'error'
    document.getElementById('status-text').textContent = msg;
  }

  // ── Start camera ───────────────────────────────────────────────────────
  async function startCamera() {
    document.getElementById('ov-start').classList.add('hidden');
    document.getElementById('ov-error').classList.add('hidden');
    setStatus('scanning', 'Starting camera…');

    if (typeof jsQR === 'undefined') {
      showError('jsQR library not loaded', 'Reload the page or paste the URL manually below.');
      return;
    }

    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 } }
      });
      video.srcObject = stream;
      await video.play();                    // await play() so video is actually running
      setStatus('scanning', 'Scanning for QR code…');
      scanning = true;
      requestAnimationFrame(tick);
    } catch (err) {
      if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
        showError('Camera permission denied', 'Allow camera access in your browser settings, then tap Retry.');
      } else if (err.name === 'NotFoundError') {
        showError('No camera found', 'This device has no accessible camera. Use manual entry below.');
        document.getElementById('manual-wrap').classList.add('visible');
      } else {
        showError('Camera error: ' + err.name, err.message);
      }
    }
  }

  // ── Frame scan loop ────────────────────────────────────────────────────
  function tick() {
    if (!scanning) return;

    try {
      if (video.readyState >= 2 && video.videoWidth > 0) {
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const result  = jsQR(imgData.data, imgData.width, imgData.height,
                             { inversionAttempts: 'dontInvert' });

        if (result && result.data) {
          // Show every QR found in the status bar so user gets feedback
          const preview = result.data.length > 60
            ? result.data.slice(0, 57) + '…'
            : result.data;
          setStatus('scanning', 'Found QR: ' + preview);
          handleQR(result.data);
        }
      }
    } catch (e) {
      // Don't let a single frame error kill the loop — just log it
      setStatus('error', 'Scan error: ' + e.message);
    }

    requestAnimationFrame(tick);
  }

  // ── Process a detected QR string ──────────────────────────────────────
  function handleQR(data) {
    // Accept http:// or https:// Cardboard URLs
    if (!data.includes('google.com/cardboard/cfg')) return;

    scanning = false;
    stopCamera();

    try {
      const url    = new URL(data.startsWith('http') ? data : 'http://' + data);
      const p      = url.searchParams.get('p');

      if (!p) {
        showError('QR found but missing viewer data', 'The URL has no "p" parameter. Try manual entry.');
        return;
      }

      saveAndProceed(p, data);
    } catch (e) {
      showError('Could not parse QR URL', e.message);
    }
  }

  // ── Manual URL entry ───────────────────────────────────────────────────
  function submitManual() {
    const raw = document.getElementById('manual-input').value.trim();
    if (!raw) return;

    try {
      const url = new URL(raw);
      const p   = url.searchParams.get('p');
      if (!p) { setStatus('error', 'No "p=" parameter found in that URL.'); return; }
      saveAndProceed(p, raw);
    } catch (e) {
      setStatus('error', 'Not a valid URL: ' + e.message);
    }
  }

  function toggleManual() {
    const wrap = document.getElementById('manual-wrap');
    wrap.classList.toggle('visible');
  }

  // ── Save params and advance ────────────────────────────────────────────
  function saveAndProceed(paramStr, fullUrl) {
    localStorage.setItem('cardboardParams', paramStr);
    localStorage.setItem('cardboardQRUrl',  fullUrl);

    document.getElementById('success-detail').textContent =
      'Params saved. Proceeding to VR…';
    document.getElementById('ov-success').classList.remove('hidden');
    document.getElementById('scan-frame').style.display = 'none';
    setStatus('ok', 'Viewer profile saved.');

    setTimeout(() => { window.location.href = 'vr-scene.html'; }, 1000);
  }

  // ── Helpers ────────────────────────────────────────────────────────────
  function stopCamera() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  }

  function showError(title, detail) {
    scanning = false;
    document.getElementById('error-title').textContent  = title;
    document.getElementById('error-detail').textContent = detail || '';
    document.getElementById('ov-error').classList.remove('hidden');
    setStatus('error', title);
  }

  function skip() {
    scanning = false;
    stopCamera();
    localStorage.setItem('cardboardParams', '');
    window.location.href = 'vr-scene.html';
  }
</script>


</body>
</html>
